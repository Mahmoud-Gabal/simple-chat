<body>

            <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Calendar</span></a>

            <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Settings</span></a>

        <div class="sidebar-footer">
            <img class="user-avatar" src="../../assets/avatar.png" alt="" width="48" height="48">
            <div class="user-info">
                <div class="user-name" id="sidebarUserName">You</div>
                <div class="user-role" id="sidebarUserRole">user@example.com</div>
                <a href="../../back-end/logout.php" class="sidebar-logout">Log out</a>
            </div>
        </div>
    </aside>

    <div class="content-area">
        <header class="top-bar">
            <div class="top-bar-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search" autocomplete="off">
            </div>
            <div class="top-bar-actions">
                <button type="button" class="top-bar-btn" title="Brightness" aria-label="Toggle theme">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
                <button type="button" class="top-bar-btn" title="Notifications" aria-label="Notifications">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                </button>
            </div>
        </header>

        <div class="main-row">
    <section class="conversation-list">
        <div class="conv-header">
            <div class="conv-title-row">
                <h1 class="conv-title">Messages</h1>
            </div>
            <div class="conv-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Search" disabled>
            </div>
        </div>
        <div class="conv-items">
            <div class="conv-item active">
                <img class="conv-avatar" src="../../assets/avatar.png" alt="" width="42" height="42">
                <div class="conv-content">
                    <div class="conv-name">Ahmed</div>
                    <div class="conv-preview" id="convPreview">No messages yet</div>
                </div>
                <div class="conv-time" id="convTime">-</div>
            </div>
        </div>
    </section>

    <main class="chat-main">
        <header class="chat-header">
            <div class="chat-header-avatar-wrap">
                <img src="../../assets/avatar.png" alt="" width="48" height="48">
                <span class="avatar-online"></span>
            </div>
            <div class="chat-header-info">
                <div class="chat-header-name">Ahmed</div>
                <div class="chat-header-status">Online now</div>
            </div>
        </header>

        <div class="chat-messages" id="chatMessages"></div>

        <form class="chat-composer" id="chatForm">
            <div class="composer-input-wrap">
                <input type="text" name="message" id="messageInput" class="chat-input" placeholder="Type a message..." required autocomplete="off">
            </div>
            <div class="composer-actions">
                <button type="button" class="composer-btn" title="Attach" aria-label="Attach file">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <button type="button" class="composer-btn" title="Microphone" aria-label="Voice input">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button type="submit" class="composer-btn send" title="Send" aria-label="Send message">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </form>
    </main>
        </div>
    </div>
</div>

<script src="../js/chat.js"></script>
