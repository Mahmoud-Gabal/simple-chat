<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chatty</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito Sans', system-ui, sans-serif;
            background: #0b1216;
            color: rgba(228, 238, 244, 0.9);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Layout - full width, fixed nav + conv list, chat fills */
        .chat-page {
            display: flex;
            height: 100vh;
            width: 100%;
            padding-left: 266px;
        }

        /* Left sidebar - 266px fixed */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 266px;
            height: 100vh;
            background: #0b1216;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(228, 238, 244, 0.08);
            z-index: 10;
        }

        .logo {
            padding: 24px 24px 12px;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 36px;
            color: rgba(228, 238, 244, 0.9);
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-size: 16px;
            color: rgba(228, 238, 244, 0.9);
            text-decoration: none;
            border-radius: 8px;
            cursor: default;
        }

        .nav-item svg {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            opacity: 0.9;
        }

        .nav-item.active {
            background: rgba(31, 152, 221, 0.08);
            border-left: 2px solid #1f98dd;
            color: #1f98dd;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 16px;
            border-top: 1px solid rgba(228, 238, 244, 0.12);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 200px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .avatar-online {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 10px;
            height: 10px;
            background: #12b76a;
            border: 1.5px solid #0b1216;
            border-radius: 5px;
            display: block;
        }

        .avatar-36 .avatar-online { width: 8px; height: 8px; border-radius: 5px; }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            font-size: 16px;
            color: rgba(228, 238, 244, 0.9);
        }

        .user-role {
            font-size: 14px;
            color: rgba(228, 238, 244, 0.65);
        }

        .sidebar-logout {
            display: inline-block;
            margin-top: 6px;
            font-size: 12px;
            color: #38bdf8;
            text-decoration: none;
        }

        .sidebar-logout:hover {
            text-decoration: underline;
        }

        /* Content area: top bar + main row */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
            background: #0b1216;
        }

        .top-bar-search {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            max-width: 434px;
            flex: 1;
        }

        .top-bar-search svg {
            width: 22px;
            height: 22px;
            color: rgba(255, 255, 255, 0.65);
            flex-shrink: 0;
        }

        .top-bar-search input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: rgba(228, 238, 244, 0.9);
            font-family: inherit;
        }

        .top-bar-search input::placeholder {
            color: rgba(255, 255, 255, 0.65);
        }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .top-bar-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            border-radius: 500px;
        }

        .top-bar-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .top-bar-btn svg {
            width: 22px;
            height: 22px;
        }

        .main-row {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* Middle - conversation list - 350px fixed */
        .conversation-list {
            width: 350px;
            min-width: 350px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(228, 238, 244, 0.08);
            background: #0b1216;
        }

        .conv-header {
            padding: 24px 16px 16px;
        }

        .conv-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .conv-title {
            font-weight: 600;
            font-size: 32px;
            color: rgba(228, 238, 244, 0.9);
        }

        .conv-search {
            border: 1px solid rgba(228, 238, 244, 0.25);
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: rgba(228, 238, 244, 0.65);
        }

        .conv-search input {
            flex: 1;
            min-width: 0;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: rgba(228, 238, 244, 0.9);
            font-family: inherit;
        }

        .conv-search::placeholder,
        .conv-search input::placeholder {
            color: rgba(228, 238, 244, 0.65);
        }

        .conv-search svg {
            width: 18px;
            height: 18px;
            opacity: 0.65;
        }

        .conv-items {
            flex: 1;
            overflow-y: auto;
        }

        .conv-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            cursor: default;
            border-radius: 4px;
        }

        .conv-item.active {
            background: rgba(31, 152, 221, 0.08);
        }

        .conv-avatar {
            width: 42px;
            height: 42px;
            border-radius: 200px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .conv-content {
            flex: 1;
            min-width: 0;
        }

        .conv-name {
            font-weight: 500;
            font-size: 14px;
            color: #e4eef4;
            margin-bottom: 4px;
        }

        .conv-preview {
            font-size: 14px;
            color: rgba(228, 238, 244, 0.7);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .conv-time {
            font-size: 12px;
            color: rgba(228, 238, 244, 0.7);
            flex-shrink: 0;
        }

        /* Right - main chat area */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: #0b1216;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(228, 238, 244, 0.08);
        }

        .chat-header-avatar-wrap {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .chat-header-avatar-wrap img {
            width: 48px;
            height: 48px;
            border-radius: 200px;
            object-fit: cover;
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-name {
            font-weight: 500;
            font-size: 16px;
            color: rgba(228, 238, 244, 0.9);
        }

        .chat-header-status {
            font-size: 14px;
            color: rgba(228, 238, 244, 0.65);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.35);
        }

        .chat-messages::-webkit-scrollbar-button {
            display: none;
            height: 0;
        }

        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 352px;
        }

        .message.outgoing {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.outgoing .message-content {
            align-items: flex-end;
        }

        .message-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 200px;
            object-fit: cover;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .message-name {
            font-weight: 500;
            font-size: 14px;
            color: rgba(228, 238, 244, 0.9);
        }

        .message-bubble {
            padding: 10px 14px;
            font-size: 16px;
            line-height: 1.5;
            border-radius: 8px;
        }

        .message.incoming .message-bubble {
            background: rgba(31, 152, 221, 0.08);
            border-top-right-radius: 8px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            color: rgba(228, 238, 244, 0.9);
        }

        .message.outgoing .message-bubble {
            background: #0075b7;
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            color: #e4eef4;
        }

        .message.outgoing .message-name {
            display: none;
        }

        .message-time {
            font-size: 12px;
            color: rgba(228, 238, 244, 0.9);
            text-align: right;
        }

        .chat-composer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-top: 1px solid rgba(228, 238, 244, 0.08);
        }

        .composer-input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .chat-composer .chat-input {
            flex: 1;
            min-width: 0;
        }

        .chat-composer input {
            background: transparent;
            border: none;
            outline: none;
            font-size: 18px;
            color: rgba(228, 238, 244, 0.9);
            font-family: inherit;
        }

        .chat-composer input::placeholder {
            color: rgba(228, 238, 244, 0.65);
        }

        .composer-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .composer-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            color: rgba(228, 238, 244, 0.9);
            cursor: pointer;
            border-radius: 8px;
        }

        .composer-btn:hover {
            background: rgba(228, 238, 244, 0.08);
        }

        .composer-btn.send {
            background: #0075b7;
        }

        .composer-btn.send:hover {
            background: #0069a3;
        }

        @media (max-width: 1100px) {
            .chat-page {
                padding-left: 266px;
            }
            .conversation-list {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .chat-page {
                padding-left: 72px;
            }
            .sidebar {
                width: 72px;
            }

            .logo {
                font-size: 24px;
                padding: 16px 8px;
                text-align: center;
            }

            .nav-item span {
                display: none;
            }

            .sidebar-footer {
                flex-direction: column;
            }

            .user-info {
                display: none;
            }
        }
    </style>
</head>

<script>
const messagesContainer = document.getElementById('chatMessages');
const form = document.getElementById('chatForm');
const messageInput = document.getElementById('messageInput');
const convPreview = document.getElementById('convPreview');
const convTime = document.getElementById('convTime');

let currentUserName = localStorage.getItem('chatty_name') || 'Anonymous';

async function initUser() {
    try {
        const res = await fetch('back-end/apis/api_me.php');
        const data = await res.json();
        if (data.loggedIn && data.name) {
            currentUserName = data.name;
            const nameEl = document.getElementById('sidebarUserName');
            const roleEl = document.getElementById('sidebarUserRole');
            if (nameEl) nameEl.textContent = data.name;
            if (roleEl) roleEl.textContent = data.email || 'Logged in';
        }
    } catch (e) {
        console.error('Could not load user', e);
    }
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
}

function formatTime(dateStr) {
    const d = new Date(dateStr);
    const h = d.getHours();
    const m = d.getMinutes();
    const ampm = h >= 12 ? 'pm' : 'am';
    return (h % 12 || 12) + ':' + String(m).padStart(2, '0') + ampm;
}

async function loadMessages() {
    try {
        const res = await fetch('back-end/apis/api_messages.php');
        const data = await res.json();

        if (!res.ok) {
            if (res.status === 401) window.location.href = 'login.php';
            return;
        }
        const list = Array.isArray(data) ? data : [];

        messagesContainer.innerHTML = '';

        let lastMsg = null;
        list.forEach(msg => {
            lastMsg = msg;
            const isSelf = msg.name === currentUserName;
            const row = document.createElement('div');
            row.className = 'message ' + (isSelf ? 'outgoing' : 'incoming');

            if (!isSelf) {
                const wrap = document.createElement('div');
                wrap.className = 'message-avatar-wrap avatar-36';
                const img = document.createElement('img');
                img.className = 'message-avatar';
                img.src = 'assets/avatar.png';
                img.alt = '';
                img.width = 36;
                img.height = 36;
                const dot = document.createElement('span');
                dot.className = 'avatar-online';
                wrap.appendChild(img);
                wrap.appendChild(dot);
                row.appendChild(wrap);
            }

            const content = document.createElement('div');
            content.className = 'message-content';

            const meta = document.createElement('div');
            meta.className = 'message-name';
            meta.textContent = msg.name;
            content.appendChild(meta);

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = msg.message;
            content.appendChild(bubble);

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = formatTime(msg.created_at);
            content.appendChild(time);

            row.appendChild(content);
            messagesContainer.appendChild(row);
        });

        if (lastMsg) {
            convPreview.textContent = lastMsg.message.length > 40 ? lastMsg.message.slice(0, 37) + '...' : lastMsg.message;
            convTime.textContent = formatTime(lastMsg.created_at);
        }

        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    } catch (e) {
        console.error('Failed to load messages:', e);
    }
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = messageInput.value.trim();
    if (!message) return;

    const formData = new FormData();
    formData.append('name', currentUserName);
    formData.append('message', message);

    const sendRes = await fetch('back-end/apis/api_send.php', { method: 'POST', body: formData });
    if (sendRes.status === 401) {
        window.location.href = 'login.php';
        return;
    }

    messageInput.value = '';
    messageInput.focus();
    await loadMessages();
});

(async function init() {
    await initUser();
    await loadMessages();
    setInterval(loadMessages, 5000);
})();
</script>
